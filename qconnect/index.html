<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>QConnect - My Favorites</title>
    <meta name="description" content="Embed Quranic wisdom into your daily rhythm through contextual nudges, reflection journals, and gamified knowledge quests." />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme Color (matches app teal) -->
    <meta name="theme-color" content="#00695C" />

    <!-- Mobile PWA Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QConnect" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:title" content="QConnect | Your Daily Quranic Companion" />
    <meta property="og:description" content="Embed Quranic wisdom into your daily rhythm." />
    <meta property="og:type" content="website" />

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.workerRegistered = true;
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[QConnect] Service Worker registered:', reg.scope))
            .catch(err => console.warn('[QConnect] Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
